services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - grampulse_data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app/api

  web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  grampulse_data:
